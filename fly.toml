app = "blip-api-exla"
primary_region = "sjc"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[processes]
  web = "bunx next start -p 3000"
  worker = "sh -c 'cd /app && bun run apps/worker/src/index.ts'"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["web"]
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
